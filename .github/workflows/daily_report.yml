name: VI Daily Reports

on:
#   schedule:
#     - cron: "0 22 * * *"  # 3:30 AM IST = 10:00 PM UTC
  workflow_dispatch: {}

concurrency:
  group: vi-daily-reports
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    env:
      METABASE_SITE: ${{ secrets.METABASE_SITE }}
      METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
      TO_EMAIL: ${{ secrets.TO_EMAIL }}
      CC_EMAIL: ${{ secrets.CC_EMAIL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run daily Metabase export
        run: |
          for i in 1 2 3; do
            python -u metabase_daily_export_and_email.py && break
            echo "Attempt $i failed, retrying in 60 seconds..."
            sleep 60
          done

      - name: Keep alive
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git commit --allow-empty -m "Keep alive"
          git push
